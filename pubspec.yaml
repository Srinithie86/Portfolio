name: srinithi_portfolio
description: "Srinithi's Flutter Portfolio Website"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # For icon sets (like GitHub, LinkedIn icons)
  font_awesome_flutter: ^10.4.0

  # To open links (resume, GitHub, LinkedIn)
  url_launcher: ^6.3.2
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10
  flutter_animate: ^4.5.0
  video_player: ^2.8.2
  visibility_detector: ^0.4.0+2
  lottie: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
